apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: borelsigma-critical
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  groups:
    - name: borelsigma.rules
      rules:
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod, namespace) /
            sum(kube_pod_container_resource_limits{resource="cpu"}) by (pod, namespace) > 0.9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: High CPU usage (example rule — tune selectors for your scrape config)
        - alert: PodRestartingOften
          expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Pod restarts detected (tune threshold for your SLOs)
        - alert: TargetDown
          expr: up == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Prometheus scrape target down (tune job filters as needed)
        # When services expose RED metrics (e.g. http_requests_total), wire this expr to your job label.
        - alert: BorelAPI5xxRateHigh
          expr: |
            (
              sum(rate(http_requests_total{status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_requests_total[5m])), 1)
            ) > 0.01
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: HTTP 5xx rate above 1% (enable http_requests_total or replace with ingress metric)
