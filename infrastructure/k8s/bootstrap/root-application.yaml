apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: borelsigma-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/shellworlds/BRLBX4.0.git
    targetRevision: main
    path: infrastructure/k8s/apps/app-of-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
