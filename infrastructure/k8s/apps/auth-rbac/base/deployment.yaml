apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-rbac
  labels:
    app.kubernetes.io/name: auth-rbac
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-rbac
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-rbac
    spec:
      containers:
        - name: auth-rbac
          image: auth-rbac:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_ROOT
              value: /app
          envFrom:
            - secretRef:
                name: auth-rbac-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
