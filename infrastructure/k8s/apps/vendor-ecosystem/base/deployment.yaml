apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-ecosystem
  labels:
    app.kubernetes.io/name: vendor-ecosystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vendor-ecosystem
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vendor-ecosystem
    spec:
      containers:
        - name: vendor-ecosystem
          image: vendor-ecosystem:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_ROOT
              value: /app
          envFrom:
            - secretRef:
                name: vendor-ecosystem-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
