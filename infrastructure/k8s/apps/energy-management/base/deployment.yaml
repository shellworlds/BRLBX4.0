apiVersion: apps/v1
kind: Deployment
metadata:
  name: energy-management
  labels:
    app.kubernetes.io/name: energy-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: energy-management
  template:
    metadata:
      labels:
        app.kubernetes.io/name: energy-management
    spec:
      serviceAccountName: default
      containers:
        - name: energy-management
          image: energy-management:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_ROOT
              value: /app
          envFrom:
            - configMapRef:
                name: energy-management-config
                optional: true
            - secretRef:
                name: energy-management-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloudsql-docker/gce-proxy:1.37.2
          command:
            - /bin/sh
            - -c
          args:
            - exec /cloud_sql_proxy -ip_address_types=PRIVATE -instances="$CLOUDSQL_INSTANCES"
          env:
            - name: CLOUDSQL_INSTANCES
              valueFrom:
                configMapKeyRef:
                  name: energy-management-config
                  key: cloudsql_instances
                  optional: true
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "300m"
              memory: 256Mi
