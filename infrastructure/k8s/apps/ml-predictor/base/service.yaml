apiVersion: v1
kind: Service
metadata:
  name: ml-predictor
  labels:
    app.kubernetes.io/name: ml-predictor
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ml-predictor
  ports:
    - name: http
      port: 8080
      targetPort: http
