apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-predictor
  labels:
    app.kubernetes.io/name: ml-predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-predictor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-predictor
    spec:
      containers:
        - name: ml-predictor
          image: ml-predictor:latest
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: ml-predictor-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
