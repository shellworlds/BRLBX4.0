apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: borelsigma-namespaces
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shellworlds/BRLBX4.0.git
    targetRevision: main
    path: infrastructure/k8s/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
