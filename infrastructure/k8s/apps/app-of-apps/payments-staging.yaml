apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shellworlds/BRLBX4.0.git
    targetRevision: main
    path: infrastructure/k8s/apps/payments/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
