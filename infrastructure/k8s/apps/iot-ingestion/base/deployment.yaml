apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-ingestion
  labels:
    app.kubernetes.io/name: iot-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: iot-ingestion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iot-ingestion
    spec:
      containers:
        - name: iot-ingestion
          image: iot-ingestion:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_ROOT
              value: /app
          envFrom:
            - secretRef:
                name: iot-ingestion-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
