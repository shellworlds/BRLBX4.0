# Unified API entry. Prefer /api/{service}/... (matches frontend BFF). Legacy /{service}/... kept for older clients.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: borel-api-routes
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.borelsigma.com
      secretName: borel-api-tls
  rules:
    - host: api.borelsigma.com
      http:
        paths:
          - path: /api/energy(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: energy-management
                port:
                  number: 80
          - path: /api/vendor(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: vendor-ecosystem
                port:
                  number: 80
          - path: /api/iot(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: iot-ingestion
                port:
                  number: 80
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-rbac
                port:
                  number: 80
          - path: /api/ml(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ml-predictor
                port:
                  number: 80
          - path: /api/payments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: payments
                port:
                  number: 80
          - path: /api/compliance(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: compliance
                port:
                  number: 80
          - path: /energy(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: energy-management
                port:
                  number: 80
          - path: /vendor(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: vendor-ecosystem
                port:
                  number: 80
          - path: /iot(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: iot-ingestion
                port:
                  number: 80
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-rbac
                port:
                  number: 80
          - path: /ml(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ml-predictor
                port:
                  number: 80
