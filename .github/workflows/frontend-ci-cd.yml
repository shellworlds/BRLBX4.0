name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  REGION: us-central1
  AR_REPO: borel-sigma-containers
  IMAGE_NAME: frontend
  PROJECT_ID: borel-sigma-prod

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          AUTH0_SECRET: ci_build_placeholder_secret_at_least_32_chars_0
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://placeholder.auth0.com
          AUTH0_CLIENT_ID: placeholder
          AUTH0_CLIENT_SECRET: placeholder

  docker-release:
    needs: [lint-test-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Check Workload Identity secret
        id: wif
        shell: bash
        run: |
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping image push — configure GCP Workload Identity Federation secrets."
          fi

      - name: Authenticate to Google Cloud
        if: steps.wif.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Configure Docker for Artifact Registry
        if: steps.wif.outputs.enabled == 'true'
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        if: steps.wif.outputs.enabled == 'true'
        env:
          TAG: ${{ github.sha }}
        run: |
          img="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${TAG}"
          docker build -t "${img}" -f frontend/Dockerfile frontend \
            --build-arg AUTH0_SECRET=ci_docker_placeholder_secret_at_least_32_chars \
            --build-arg AUTH0_BASE_URL=http://localhost:3000 \
            --build-arg AUTH0_ISSUER_BASE_URL=https://placeholder.auth0.com \
            --build-arg AUTH0_CLIENT_ID=placeholder \
            --build-arg AUTH0_CLIENT_SECRET=placeholder
          docker push "${img}"

      - name: Bump dev frontend image tag in kustomize
        if: steps.wif.outputs.enabled == 'true'
        env:
          TAG: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          f="infrastructure/k8s/apps/frontend/overlays/dev/kustomization.yaml"
          sed -i.bak "s/newTag: .*/newTag: ${TAG}/" "${f}"
          rm -f "${f}.bak"

      - name: Open PR for frontend dev image tag
        if: steps.wif.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(k8s): bump frontend dev image to ${{ github.sha }}"
          branch: ci/bump-frontend-dev-${{ github.sha }}
          delete-branch: true
          title: "chore(k8s): bump frontend dev image to ${{ github.sha }}"
          body: |
            Automated frontend dev overlay tag bump after image push (`${{ github.sha }}`).
