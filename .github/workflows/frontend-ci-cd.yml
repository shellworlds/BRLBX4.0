name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci-cd.yml"

permissions:
  contents: read
  id-token: write

env:
  REGION: us-central1
  AR_REPO: borel-sigma-containers
  IMAGE_NAME: frontend
  PROJECT_ID: borel-sigma-prod

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  docker-release:
    needs: [lint-test-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Workload Identity secret
        id: wif
        shell: bash
        run: |
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping image push — configure GCP Workload Identity Federation secrets."
          fi

      - name: Authenticate to Google Cloud
        if: steps.wif.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Configure Docker for Artifact Registry
        if: steps.wif.outputs.enabled == 'true'
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        if: steps.wif.outputs.enabled == 'true'
        env:
          TAG: ${{ github.sha }}
        run: |
          img="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${TAG}"
          docker build -t "${img}" -f frontend/Dockerfile frontend
          docker push "${img}"
