# Deploys the Next.js app in ./frontend to the linked Vercel project (e.g. www.a-eq.com).
# Add these repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — from Vercel → Account Settings → Tokens
#   VERCEL_ORG_ID       — Team / org ID (Vercel dashboard URL or vercel teams ls)
#   VERCEL_PROJECT_ID   — Project → Settings → General
#
# This does not change Docker/K8s CI (frontend-ci-cd.yml). Existing pages and routes are unchanged.

name: Deploy frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-a-eq.yml"
  workflow_dispatch:

concurrency:
  group: vercel-a-eq-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Vercel production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"
