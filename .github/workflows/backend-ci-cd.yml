name: Backend CI / CD

on:
  push:
    branches: [main]
    paths:
      - "backend-services/**"
      - "infrastructure/k8s/apps/**/overlays/dev/kustomization.yaml"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    paths:
      - "backend-services/**"
      - ".github/workflows/backend-ci-cd.yml"

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  REGION: us-central1
  AR_REPO: borel-sigma-containers
  PROJECT_ID: borel-sigma-prod

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-services
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend-services/go.sum
      - name: Go test
        run: go test ./...
      - name: Coverage gate (pkg + internal packages)
        run: bash scripts/check_coverage.sh

  release:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Workload Identity secret
        id: wif
        shell: bash
        run: |
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping GCP image push — set GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT_EMAIL repository secrets."
          fi

      - name: Authenticate to Google Cloud
        if: steps.wif.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Configure Docker for Artifact Registry
        if: steps.wif.outputs.enabled == 'true'
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push images
        if: steps.wif.outputs.enabled == 'true'
        env:
          TAG: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          push_img() {
            local name="$1"
            local file="$2"
            local img="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${name}:${TAG}"
            docker build -f "${file}" -t "${img}" backend-services
            docker push "${img}"
          }
          push_img hello-world backend-services/services/hello-world/Dockerfile
          push_img energy-management backend-services/services/energy-management/Dockerfile
          push_img vendor-ecosystem backend-services/services/vendor-ecosystem/Dockerfile
          push_img iot-ingestion backend-services/services/iot-ingestion/Dockerfile
          push_img auth-rbac backend-services/services/auth-rbac/Dockerfile
          push_img ml-predictor backend-services/services/ml-predictor/Dockerfile

      - name: Bump dev Kustomize tags
        if: steps.wif.outputs.enabled == 'true'
        env:
          TAG: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          files=(
            infrastructure/k8s/apps/hello-world/overlays/dev/kustomization.yaml
            infrastructure/k8s/apps/energy-management/overlays/dev/kustomization.yaml
            infrastructure/k8s/apps/vendor-ecosystem/overlays/dev/kustomization.yaml
            infrastructure/k8s/apps/iot-ingestion/overlays/dev/kustomization.yaml
            infrastructure/k8s/apps/auth-rbac/overlays/dev/kustomization.yaml
            infrastructure/k8s/apps/ml-predictor/overlays/dev/kustomization.yaml
          )
          for f in "${files[@]}"; do
            sed -i.bak "s/newTag: .*/newTag: ${TAG}/" "${f}"
            rm -f "${f}.bak"
          done

      - name: Open PR for dev image tag bumps
        if: steps.wif.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(k8s): bump dev images to ${{ github.sha }}"
          branch: ci/bump-dev-images-${{ github.sha }}
          delete-branch: true
          title: "chore(k8s): bump dev images to ${{ github.sha }}"
          body: |
            Automated dev overlay tag bumps after building and pushing backend images (`${{ github.sha }}`).

            Merge after review; Argo CD should reconcile `dev`.
