name: E2E Playwright

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-playwright.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/e2e-playwright.yml"
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run Playwright
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_AUTH0_EMAIL: ${{ secrets.E2E_AUTH0_EMAIL }}
          E2E_AUTH0_PASSWORD: ${{ secrets.E2E_AUTH0_PASSWORD }}
          AUTH0_SECRET: ci_e2e_placeholder_secret_at_least_32_chars_x
          AUTH0_BASE_URL: http://127.0.0.1:3000
          AUTH0_ISSUER_BASE_URL: https://placeholder.auth0.com
          AUTH0_CLIENT_ID: placeholder
          AUTH0_CLIENT_SECRET: placeholder
        run: |
          export PLAYWRIGHT_BASE_URL="${PLAYWRIGHT_BASE_URL:-http://127.0.0.1:3000}"
          if [ -z "${E2E_AUTH0_EMAIL:-}" ]; then
            echo "::notice::E2E_AUTH0_EMAIL not set — auth flows skipped."
          fi
          npm run build
          npm run start &
          sleep 12
          npm run test:e2e
