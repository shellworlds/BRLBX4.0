name: Kubernetes manifests

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/k8s/**"
      - ".github/workflows/k8s-manifests.yml"
  pull_request:
    paths:
      - "infrastructure/k8s/**"
      - ".github/workflows/k8s-manifests.yml"

permissions:
  contents: read

jobs:
  kustomize-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - path: infrastructure/k8s/namespaces
          - path: infrastructure/k8s/apps/hello-world/overlays/dev
          - path: infrastructure/k8s/apps/hello-world/overlays/dev-with-prometheus
          - path: infrastructure/k8s/apps/energy-management/overlays/dev
          - path: infrastructure/k8s/apps/vendor-ecosystem/overlays/dev
          - path: infrastructure/k8s/apps/iot-ingestion/overlays/dev
          - path: infrastructure/k8s/apps/auth-rbac/overlays/dev
          - path: infrastructure/k8s/apps/app-of-apps
          - path: infrastructure/k8s/apps/ml-predictor/overlays/dev
          - path: infrastructure/k8s/apps/ml-predictor/overlays/staging
          - path: infrastructure/k8s/apps/ml-predictor/overlays/prod
          - path: infrastructure/k8s/bootstrap
    steps:
      - uses: actions/checkout@v4
      - name: Install kustomize
        run: |
          set -euo pipefail
          version="5.4.3"
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${version}/kustomize_v${version}_linux_amd64.tar.gz" | tar xz
          sudo install -m 0755 kustomize /usr/local/bin/kustomize
          kustomize version
      - name: kustomize build
        run: kustomize build "${{ matrix.path }}" >/dev/null
